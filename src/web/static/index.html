<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>audiolayers</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>audiolayers</h1>
  <div class="actions">
    <button id="btn-add-layer">+ layer</button>
    <button id="btn-export">esporta yaml</button>
    <label class="filebtn">importa yaml<input type="file" id="file-import" accept=".yaml,.yml"></label>
    <button id="btn-render" class="primary">render</button>
    <button id="btn-theme" title="chiaro/scuro">☀</button>
  </div>
</header>
<div id="subbar">
  <label class="toggle"><input type="checkbox" id="chk-dig"> download (dig) — popola il pool da Internet Archive prima del render</label>
</div>

<section id="globals" class="panel">
  <h2>globali</h2>
  <div id="global-params" class="params"></div>
</section>

<main id="layers"></main>

<aside id="infobox" hidden>
  <h3></h3>
  <p></p>
</aside>

<div id="terminal">
  <div id="term-head">terminale <span id="term-arrow">▸</span></div>
  <pre id="term-body" hidden></pre>
</div>

<footer id="status-bar">
  <span id="status">pronto</span>
  <audio id="player" controls hidden></audio>
  <a id="btn-download" hidden download="audiolayers.wav">scarica wav</a>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
